[match]
cpu_families = ["cortex-a53", "cortex-a72", "cortex-a76"]

[firmware.sources]
# The UEFI shims to make them "PC-like"
RPI5 = "https://github.com/worproject/rpi5-uefi/releases/download/v0.3/RPi5_UEFI_Release_v0.3.zip"
RPI4 = "https://github.com/pftf/RPi4/releases/download/v1.42/RPi4_UEFI_Firmware_v1.42.zip"
RPI3 = "https://github.com/pftf/RPi3/releases/download/v1.39/RPi3_UEFI_Firmware_v1.39.zip"

[boot.modern]
# GRUB + DTB Logic
loader = "grub-efi-arm64"
efi_mount = "/boot/efi"
# The magic line you need for Bluetooth/GPIO
grub_dtb_line = 'GRUB_DTB="dtbs/broadcom/bcm2712-rpi-5-b.dtb"' 

[boot.classic]
# Firmware + config.txt Logic
loader = "raspberrypi-firmware"
config_pokes = ["arm_64bit=1", "dtparam=pciex1_gen=3"]


[packages.gentoo]
required = [
    "sys-boot/grub", 
    "sys-kernel/raspberrypi-sources",
    "sys-apps/dtc" # Device Tree Compiler
]
recommended = [
    "net-wireless/pi-bluetooth",
    "sys-apps/raspberrypi-utils"
]

[packages.arch]
required = ["grub", "raspberrypi-firmware", "linux-rpi"]
recommended = ["raspbian-toolchain", "rpi-eeprom"]
